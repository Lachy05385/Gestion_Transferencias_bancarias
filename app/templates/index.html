<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📱 Gestor de Transferencias Bancarias</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        /* Login Section */
        .login-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .login-section h2 {
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .login-form {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 15px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            color: #555;
            font-weight: 600;
            font-size: 0.9em;
        }

        .form-group input, .form-group select, .form-group textarea {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #48c774 0%, #2ecc71 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(46, 204, 113, 0.4);
        }

        .token-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            word-break: break-all;
            font-family: monospace;
            display: none;
        }

        .token-info.visible {
            display: block;
        }

        /* Transfer Section */
        .transfer-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: none;
        }

        .transfer-section.visible {
            display: block;
        }

        .transfer-section h2 {
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .textarea-container {
            margin-bottom: 20px;
        }

        .textarea-container textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: vertical;
        }

        .transfer-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .transfer-options .form-group {
            width: 100%;
        }

        /* Result Section */
        .result-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: none;
        }

        .result-section.visible {
            display: block;
        }

        .result-section h3 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            border-left: 4px solid #48c774;
        }

        .result-item {
            display: flex;
            margin-bottom: 10px;
            border-bottom: 1px solid #dee2e6;
            padding-bottom: 10px;
        }

        .result-label {
            font-weight: 600;
            width: 150px;
            color: #495057;
        }

        .result-value {
            flex: 1;
            color: #212529;
            font-family: monospace;
        }

        .error-card {
            background: #fff5f5;
            border-radius: 8px;
            padding: 20px;
            border-left: 4px solid #f56565;
            color: #c53030;
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Ejemplos */
        .examples {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .examples h4 {
            color: #555;
            margin-bottom: 10px;
        }

        .example-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .example-btn {
            padding: 8px 15px;
            background: white;
            border: 2px solid #667eea;
            border-radius: 20px;
            color: #667eea;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .example-btn:hover {
            background: #667eea;
            color: white;
        }

        /* Status Badge */
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .status-success {
            background: #c6f6d5;
            color: #22543d;
        }

        .status-error {
            background: #fed7d7;
            color: #742a2a;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-form {
                grid-template-columns: 1fr;
            }
            
            .transfer-options {
                grid-template-columns: 1fr;
            }
            
            .result-item {
                flex-direction: column;
            }
            
            .result-label {
                width: 100%;
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🏦 Gestor de Transferencias Bancarias</h1>
            <p>Prueba la integración con tu backend FastAPI</p>
        </div>

        <!-- Login Section -->
        <div class="login-section" id="loginSection">
            <h2>
                <span>🔐</span>
                <span>Autenticación</span>
            </h2>
            <div class="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" value="lazaro1@example.com" placeholder="usuario@email.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" value="Lachy05385*" placeholder="********">
                </div>
                <button class="btn btn-primary" onclick="login()" id="loginBtn">
                    <span>Iniciar Sesión</span>
                </button>
            </div>
            <div class="token-info" id="tokenInfo">
                <strong>Token JWT:</strong>
                <p id="tokenDisplay"></p>
            </div>
        </div>

        <!-- Transfer Section -->
        <div class="transfer-section" id="transferSection">
            <h2>
                <span>📤</span>
                <span>Enviar Transferencia</span>
            </h2>
            
            <div class="textarea-container">
                <textarea id="transferText" placeholder="Pega aquí el texto de la transferencia bancaria...">Banco Popular de Ahorro:  La Transferencia fue completada.   Fecha: 12/3/2026   Beneficiario: 9205XXXXXXXX7786   Ordenante: 9205XXXXXXXX9210   Monto: 10000.00 CUP   Nro. Transaccion: BR600CNNS7997</textarea>
            </div>

            <div class="transfer-options">
                <div class="form-group">
                    <label>Tipo de Transferencia</label>
                    <select id="transferType">
                        <option value="RECIBIDA">Recibida</option>
                        <option value="ENVIADA">Enviada</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Descripción (opcional)</label>
                    <input type="text" id="transferDescription" placeholder="Ej: Pago de servicios">
                </div>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="btn btn-success" onclick="enviarTransferencia()" id="sendBtn">
                    <span>📨 Enviar Transferencia</span>
                </button>
                <button class="btn btn-primary" onclick="limpiarFormulario()">
                    <span>🗑️ Limpiar</span>
                </button>
            </div>

            <!-- Ejemplos predefinidos -->
            <div class="examples">
                <h4>📋 Ejemplos de texto bancario:</h4>
                <div class="example-buttons">
                    <button class="example-btn" onclick="cargarEjemplo(1)">Ejemplo 1 (Popular)</button>
                    <button class="example-btn" onclick="cargarEjemplo(2)">Ejemplo 2 (Metropolitano)</button>
                    <button class="example-btn" onclick="cargarEjemplo(3)">Ejemplo 3 (Nacional)</button>
                </div>
            </div>
        </div>

        <!-- Result Section -->
        <div class="result-section" id="resultSection">
            <h3>
                <span>📊</span>
                <span>Resultado</span>
            </h3>
            <div id="resultContent"></div>
        </div>
    </div>

    <script>
        // Configuración
        const BASE_URL = 'http://localhost:8000';
        let tokenActual = null;

        // Función de Login
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            // Mostrar loading
            loginBtn.innerHTML = '<span class="spinner"></span> Conectando...';
            loginBtn.disabled = true;

            try {
                console.log('🔐 Intentando login con:', { email, password });
                
                const response = await fetch(`${BASE_URL}/token`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        'username': email,
                        'password': password
                    })
                });

                const data = await response.json();
                console.log('📥 Respuesta login:', data);

                if (response.ok) {
                    tokenActual = data.access_token;
                    
                    // Mostrar token
                    document.getElementById('tokenDisplay').textContent = tokenActual;
                    document.getElementById('tokenInfo').classList.add('visible');
                    
                    // Mostrar sección de transferencias
                    document.getElementById('transferSection').classList.add('visible');
                    
                    // Actualizar botón
                    loginBtn.innerHTML = '✅ Sesión Iniciada';
                    loginBtn.style.background = '#48c774';
                    
                    // Mostrar resultado exitoso
                    mostrarResultado({
                        success: true,
                        message: '✅ Login exitoso! Token obtenido correctamente.'
                    });
                    
                } else {
                    throw new Error(data.detail || 'Error en login');
                }
            } catch (error) {
                console.error('❌ Error:', error);
                mostrarResultado({
                    success: false,
                    error: error.message
                });
                
                loginBtn.innerHTML = '🔐 Iniciar Sesión';
                loginBtn.disabled = false;
            }
        }

        // Función para enviar transferencia
        async function enviarTransferencia() {
            if (!tokenActual) {
                mostrarResultado({
                    success: false,
                    error: 'Primero debes iniciar sesión'
                });
                return;
            }

            const texto = document.getElementById('transferText').value;
            const tipo = document.getElementById('transferType').value;
            const descripcion = document.getElementById('transferDescription').value;
            const sendBtn = document.getElementById('sendBtn');

            if (!texto.trim()) {
                mostrarResultado({
                    success: false,
                    error: 'El texto de la transferencia no puede estar vacío'
                });
                return;
            }

            // Mostrar loading
            sendBtn.innerHTML = '<span class="spinner"></span> Enviando...';
            sendBtn.disabled = true;

            try {
                console.log('📤 Enviando transferencia:', { texto, tipo, descripcion });
                console.log('🔑 Token usado:', tokenActual.substring(0, 30) + '...');

                const response = await fetch(`${BASE_URL}/transacciones/recibir`, {
                    method: 'POST',
                    body: new URLSearchParams({
                        'texto': texto,
                        'tipo': tipo,
                        'token': tokenActual,
                        'descripcion': descripcion || ''
                    })
                });

                const data = await response.json();
                console.log('📥 Respuesta:', data);

                if (response.ok) {
                    mostrarResultado({
                        success: true,
                        data: data,
                        message: '✅ Transferencia procesada exitosamente!'
                    });
                    
                    // Limpiar descripción
                    document.getElementById('transferDescription').value = '';
                    
                } else {
                    throw new Error(JSON.stringify(data.detail || data));
                }
            } catch (error) {
                console.error('❌ Error:', error);
                mostrarResultado({
                    success: false,
                    error: error.message
                });
            } finally {
                sendBtn.innerHTML = '📨 Enviar Transferencia';
                sendBtn.disabled = false;
            }
        }

        // Función para mostrar resultados
        function mostrarResultado(result) {
            const resultSection = document.getElementById('resultSection');
            const resultContent = document.getElementById('resultContent');
            
            resultSection.classList.add('visible');
            
            if (result.success) {
                if (result.data) {
                    // Formatear la respuesta JSON bonita
                    const data = result.data;
                    let html = `
                        <div class="result-card">
                            <div style="margin-bottom: 15px;">
                                <span class="status-badge status-success">✅ Éxito</span>
                                ${result.message ? `<p style="margin-top: 10px; color: #22543d;">${result.message}</p>` : ''}
                            </div>
                            <div style="background: #2d3748; color: #a0aec0; padding: 15px; border-radius: 8px; overflow-x: auto;">
                                <pre style="margin: 0; font-family: monospace; font-size: 14px;">${JSON.stringify(data, null, 2)}</pre>
                            </div>
                    `;
                    
                    // Mostrar campos principales
                    if (data.id) {
                        html += `
                            <div style="margin-top: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                                <div style="background: #ebf8ff; padding: 10px; border-radius: 8px;">
                                    <strong style="color: #2c5282;">ID:</strong>
                                    <p style="color: #2d3748;">${data.id}</p>
                                </div>
                                <div style="background: #f0fff4; padding: 10px; border-radius: 8px;">
                                    <strong style="color: #276749;">Monto:</strong>
                                    <p style="color: #2d3748;">${data.monto} ${data.moneda}</p>
                                </div>
                                <div style="background: #fffaf0; padding: 10px; border-radius: 8px;">
                                    <strong style="color: #c05621;">Fecha:</strong>
                                    <p style="color: #2d3748;">${data.fecha}</p>
                                </div>
                                <div style="background: #e6fffa; padding: 10px; border-radius: 8px;">
                                    <strong style="color: #319795;">Tipo:</strong>
                                    <p style="color: #2d3748;">${data.tipo}</p>
                                </div>
                            </div>
                        </div>
                    `;
                    resultContent.innerHTML = html;
                } else {
                    resultContent.innerHTML = `
                        <div class="result-card">
                            <span class="status-badge status-success">✅ Éxito</span>
                            <p style="margin-top: 15px; color: #22543d;">${result.message || 'Operación exitosa'}</p>
                        </div>
                    `;
                }
            } else {
                resultContent.innerHTML = `
                    <div class="error-card">
                        <span class="status-badge status-error">❌ Error</span>
                        <p style="margin-top: 15px; color: #742a2a; white-space: pre-wrap;">${result.error || 'Error desconocido'}</p>
                        <button onclick="this.parentElement.style.display='none'" style="margin-top: 10px; padding: 5px 10px; background: #742a2a; color: white; border: none; border-radius: 5px; cursor: pointer;">
                            Cerrar
                        </button>
                    </div>
                `;
            }
        }

        // Función para cargar ejemplos
        function cargarEjemplo(numero) {
            const ejemplos = {
                1: `Banco Popular de Ahorro:  La Transferencia fue completada.   Fecha: 12/3/2026   Beneficiario: 9205XXXXXXXX7786   Ordenante: 9205XXXXXXXX9210   Monto: 10000.00 CUP   Nro. Transaccion: BR600CNNS7997`,
                
                2: `Banco Metropolitano: Transferencia recibida. Fecha: 15/03/2026. Origen: 9104XXXXXXXX1234. Destino: 9205XXXXXXXX5678. Importe: 500.50 CUP. Ref: MT567890123`,
                
                3: `Banco Nacional de Cuba: Operación completada. Fecha: 20/03/2026. De: 9104XXXXXXXX4321. Para: 9205XXXXXXXX8765. Cantidad: 1250.00 CUP. Concepto: Pago de servicios. Código: BN789012345`
            };
            
            document.getElementById('transferText').value = ejemplos[numero] || ejemplos[1];
        }

        // Función para limpiar formulario
        function limpiarFormulario() {
            document.getElementById('transferText').value = '';
            document.getElementById('transferDescription').value = '';
            document.getElementById('transferType').value = 'RECIBIDA';
            document.getElementById('resultSection').classList.remove('visible');
        }

        // Función para verificar si hay token guardado al cargar la página
        window.onload = function() {
            console.log('🚀 Página cargada. Backend URL:', BASE_URL);
            
            // Verificar si el backend está disponible
            fetch(`${BASE_URL}/health`)
                .then(response => response.json())
                .then(data => {
                    console.log('✅ Backend conectado:', data);
                    mostrarResultado({
                        success: true,
                        message: '✅ Conexión con backend establecida correctamente'
                    });
                })
                .catch(error => {
                    console.error('❌ Backend no disponible:', error);
                    mostrarResultado({
                        success: false,
                        error: 'No se puede conectar con el backend. Asegúrate de que el servidor esté corriendo en ' + BASE_URL
                    });
                });
        };
    </script>
</body>
</html>
