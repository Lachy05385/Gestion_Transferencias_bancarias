<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✏️ Editar Transacción - Gestor Bancario</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            color: #333;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info span {
            color: #666;
        }

        .user-info strong {
            color: #667eea;
        }

        .btn-volver {
            background: #718096;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn-volver:hover {
            background: #4a5568;
            transform: translateY(-2px);
        }

        .logout-btn {
            background: #f56565;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #e53e3e;
            transform: translateY(-2px);
        }

        /* Búsqueda */
        .search-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .search-section h2 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-box input {
            flex: 2;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-box select {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
        }

        .search-box button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* Lista de transacciones */
        .transactions-list {
            background: white;
            border-radius: 15px;
            overflow-x: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: none;
        }

        .transactions-list.visible {
            display: block;
        }

        .transactions-list h3 {
            padding: 20px 20px 0;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .edit-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s;
        }

        .edit-btn:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }

        /* Modal de edición */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.visible {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .modal-header h3 {
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
            transition: all 0.3s;
        }

        .close-modal:hover {
            color: #f56565;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95em;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn-save {
            flex: 1;
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.4);
        }

        .btn-cancel {
            flex: 1;
            background: #e0e0e0;
            color: #666;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-cancel:hover {
            background: #c0c0c0;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
        }

        .badge-enviada { background: #fed7d7; color: #c53030; }
        .badge-recibida { background: #c6f6d5; color: #22543d; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                <span>✏️</span>
                <span>Editar Transacciones</span>
            </h1>
            <div class="user-info">
                <span>👤 <strong id="userName">Cargando...</strong></span>
                <a href="/dashboard" class="btn-volver">📊 Dashboard</a>
                <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>

        <!-- Búsqueda -->
        <div class="search-section">
            <h2>
                <span>🔍</span>
                <span>Buscar Transacción</span>
            </h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar por N° transacción, beneficiario, ordenante o banco...">
                <select id="tipoFilter">
                    <option value="">Todos los tipos</option>
                    <option value="enviada">📤 Enviadas</option>
                    <option value="recibida">📥 Recibidas</option>
                </select>
                <button onclick="buscarTransacciones()">🔍 Buscar</button>
            </div>
        </div>

        <!-- Lista de transacciones -->
        <div class="transactions-list" id="transactionsList">
            <h3>📋 Resultados</h3>
            <div id="tableContainer"></div>
        </div>
    </div>

    <!-- Modal de edición -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>
                    <span>✏️</span>
                    <span>Editar Transacción</span>
                </h3>
                <button class="close-modal" onclick="cerrarModal()">&times;</button>
            </div>
            <div id="modalForm"></div>
        </div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:8000';
        let token = null;
        let user = null;

        // ========== AUTENTICACIÓN ==========
        function getToken() {
            const params = new URLSearchParams(window.location.search);
            const urlToken = params.get('token');
            if (urlToken) {
                localStorage.setItem('token', urlToken);
                return urlToken;
            }
            return localStorage.getItem('token');
        }

        async function getUserProfile() {
            token = getToken();
            if (!token) {
                window.location.href = '/test';
                return null;
            }

            try {
                const response = await fetch(`${BASE_URL}/perfil`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    user = await response.json();
                    document.getElementById('userName').textContent = `${user.nombre} ${user.apellido}`;
                    return user;
                } else {
                    localStorage.removeItem('token');
                    window.location.href = '/test';
                    return null;
                }
            } catch (error) {
                console.error('Error:', error);
                window.location.href = '/test';
                return null;
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/test';
        }

        // ========== BUSCAR TRANSACCIONES ==========
        async function buscarTransacciones() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            const tipo = document.getElementById('tipoFilter').value;
            const tableContainer = document.getElementById('tableContainer');
            const transactionsList = document.getElementById('transactionsList');

            // 🔧 Validación: Si no hay término de búsqueda NI tipo seleccionado, mostrar un mensaje claro.
            if (!searchTerm && !tipo) {
                alert('Por favor, ingresa un término de búsqueda o selecciona un tipo de transacción.');
                return;
            }

            // Si hay tipo pero no término de búsqueda, mostramos un mensaje informativo (opcional)
            if (!searchTerm && tipo) {
                if (!confirm(`Mostrar todas las transacciones de tipo "${tipo}"? Puede haber muchos resultados.`)) {
                    return;
                }
            }

            tableContainer.innerHTML = '<div class="loading"><div class="spinner"></div><p>Buscando...</p></div>';
            transactionsList.classList.add('visible');

            try {
                // Construir URL correctamente con URLSearchParams
                const params = new URLSearchParams();
                
                if (searchTerm) {
                    params.append('q', searchTerm);
                }
                if (tipo) {
                    params.append('tipo', tipo);
                }
                
                const url = `${BASE_URL}/transacciones/buscar?${params.toString()}`;
                console.log('📤 URL de búsqueda:', url);
                
                const response = await fetch(url, {
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Error response:', errorText);
                    throw new Error(`Error ${response.status}: ${errorText}`);
                }

                const transacciones = await response.json();
                console.log('📊 Transacciones recibidas:', transacciones.length);
                mostrarResultados(transacciones);

            } catch (error) {
                console.error('Error en búsqueda:', error);
                tableContainer.innerHTML = `<div class="empty-message">❌ Error al buscar: ${error.message}</div>`;
            }
        }

        function mostrarResultados(transacciones) {
            const tableContainer = document.getElementById('tableContainer');

            if (transacciones.length === 0) {
                tableContainer.innerHTML = '<div class="empty-message">📭 No se encontraron transacciones</div>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>N° Transacción</th>
                            <th>Tipo</th>
                            <th>Beneficiario</th>
                            <th>Ordenante</th>
                            <th>Monto</th>
                            <th>Moneda</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            for (const t of transacciones) {
                const tipoClass = t.tipo === 'enviada' ? 'badge-enviada' : 'badge-recibida';
                const tipoText = t.tipo === 'enviada' ? '📤 Enviada' : '📥 Recibida';

                html += `
                    <tr>
                        <td>${t.fecha || '-'}</td>
                        <td><strong>${t.numero_transaccion || '-'}</strong></td>
                        <td><span class="badge ${tipoClass}">${tipoText}</span></td>
                        <td>${t.beneficiario || '-'}</td>
                        <td>${t.ordenante || '-'}</td>
                        <td>${t.monto} ${t.moneda}</td>
                        <td>${t.banco || '-'}</td>
                        <td><button class="edit-btn" onclick="abrirModal(${t.id})">✏️ Editar</button></td>
                    </tr>
                `;
            }

            html += '</tbody></table>';
            tableContainer.innerHTML = html;
        }

        // ========== MODAL DE EDICIÓN ==========
        let transaccionActual = null;

        async function abrirModal(id) {
            try {
                const response = await fetch(`${BASE_URL}/transacciones/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Error al cargar la transacción');

                transaccionActual = await response.json();
                mostrarFormularioEdicion();

            } catch (error) {
                console.error('Error:', error);
                alert('Error al cargar la transacción: ' + error.message);
            }
        }

        function mostrarFormularioEdicion() {
            const modal = document.getElementById('editModal');
            const modalForm = document.getElementById('modalForm');
            
            modalForm.innerHTML = `
                <form id="editForm" onsubmit="guardarCambios(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Fecha (DD/MM/YYYY)</label>
                            <input type="text" name="fecha" value="${transaccionActual.fecha || ''}" required>
                        </div>
                        <div class="form-group">
                            <label>Banco</label>
                            <input type="text" name="banco" value="${transaccionActual.banco || ''}" required minlength="2">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Beneficiario (Cuenta Destino)</label>
                            <input type="text" name="beneficiario" value="${transaccionActual.beneficiario || ''}" required minlength="4">
                        </div>
                        <div class="form-group">
                            <label>Ordenante (Cuenta Origen)</label>
                            <input type="text" name="ordenante" value="${transaccionActual.ordenante || ''}" required minlength="4">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Monto</label>
                            <input type="number" step="0.01" name="monto" value="${transaccionActual.monto}" required min="0.01">
                        </div>
                        <div class="form-group">
                            <label>Moneda</label>
                            <select name="moneda">
                                <option value="CUP" ${transaccionActual.moneda === 'CUP' ? 'selected' : ''}>CUP - Peso Cubano</option>
                                <option value="USD" ${transaccionActual.moneda === 'USD' ? 'selected' : ''}>USD - Dólar</option>
                                <option value="EUR" ${transaccionActual.moneda === 'EUR' ? 'selected' : ''}>EUR - Euro</option>
                                <option value="MLC" ${transaccionActual.moneda === 'MLC' ? 'selected' : ''}>MLC - Moneda Libremente Convertible</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Número de Transacción</label>
                        <input type="text" name="numero_transaccion" value="${transaccionActual.numero_transaccion || ''}" required minlength="4">
                    </div>
                    <div class="form-group">
                        <label>Descripción</label>
                        <textarea name="descripcion" rows="3">${transaccionActual.descripcion || ''}</textarea>
                    </div>
                    <div class="modal-buttons">
                        <button type="submit" class="btn-save">💾 Guardar Cambios</button>
                        <button type="button" class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
                    </div>
                </form>
            `;
            
            modal.classList.add('visible');
        }
        async function guardarCambios(event) {
            event.preventDefault();
            
            // 👇 FORMA CORRECTA de obtener todos los valores del formulario
            const form = document.getElementById('editForm');
            const formData = new FormData(form);
            
            // Extraer TODOS los campos manualmente (más confiable)
            const datosActualizados = {
                banco: document.querySelector('[name="banco"]')?.value || '',
                fecha: document.querySelector('[name="fecha"]')?.value || '',
                beneficiario: document.querySelector('[name="beneficiario"]')?.value || '',
                ordenante: document.querySelector('[name="ordenante"]')?.value || '',
                monto: parseFloat(document.querySelector('[name="monto"]')?.value || 0),
                moneda: document.querySelector('[name="moneda"]')?.value || 'CUP',
                numero_transaccion: document.querySelector('[name="numero_transaccion"]')?.value || '',
                descripcion: document.querySelector('[name="descripcion"]')?.value || '',
                tipo: transaccionActual.tipo,  // 👈 Agregar tipo (se mantiene)
                estado: transaccionActual.estado  // 👈 Agregar estado (se mantiene)
                //etiquetas: []
            };
                    // 👇 VERIFICAR qué datos se están enviando
            console.log('📤 DATOS A ENVIAR:', datosActualizados);
            
            // Validaciones
            if (datosActualizados.monto <= 0) {
                alert('El monto debe ser mayor que 0');
                return;
            }
            
            if (!datosActualizados.numero_transaccion) {
                alert('El número de transacción es requerido');
                return;
            }
            
            const saveBtn = document.querySelector('.btn-save');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<span class="spinner" style="width:16px;height:16px;"></span> Guardando...';
            
            try {
                const response = await fetch(`${BASE_URL}/transacciones/${transaccionActual.id}`, {
                    method: 'PUT',  // Usamos PUT para actualizar todos los campos
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(datosActualizados)
                });
                
                const data = await response.json();
                console.log('📥 RESPUESTA:', data);
                
                if (response.ok) {
                    alert('✅ Transacción actualizada correctamente');
                    cerrarModal();
                    buscarTransacciones(); // Refrescar lista
                } else {
                    let errorMsg = data.detail;
                    if (Array.isArray(data.detail)) {
                        errorMsg = data.detail.map(e => e.msg).join(', ');
                    }
                    alert('❌ Error al guardar: ' + errorMsg);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('❌ Error de conexión: ' + error.message);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = '💾 Guardar Cambios';
            }
        }

        function cerrarModal() {
            const modal = document.getElementById('editModal');
            modal.classList.remove('visible');
            transaccionActual = null;
        }

        // ========== INICIALIZACIÓN ==========
        async function init() {
            await getUserProfile();
        }

        init();
    </script>
</body>
</html>
