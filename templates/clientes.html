<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👥 Información de Clientes - Transferencias</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logout-btn, .btn-dashboard {
            background: #f56565;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
        }

        .btn-dashboard {
            background: #4299e1;
        }

        /* Stats Cards */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-card h3 {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 1.8em;
            font-weight: bold;
            color: #1a1a2e;
        }

        /* Filtros */
        .filters-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .filters-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1;
            min-width: 150px;
        }

        .filter-group label {
            display: block;
            font-size: 0.8em;
            color: #666;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .filter-group input, .filter-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .filter-group input:focus, .filter-group select:focus {
            outline: none;
            border-color: #4299e1;
        }

        .btn-filter {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-filter:hover {
            transform: translateY(-2px);
        }

        .btn-clear {
            background: #718096;
        }

        /* Tabla */
        .transactions-table {
            background: white;
            border-radius: 15px;
            overflow-x: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
        }

        .badge-recibida {
            background: #c6f6d5;
            color: #22543d;
        }

        .badge-enviada {
            background: #fed7d7;
            color: #c53030;
        }

        .badge-pendiente {
            background: #feebc8;
            color: #c05621;
        }

        .badge-confirmada {
            background: #c6f6d5;
            color: #22543d;
        }

        .descripcion-cell {
            max-width: 300px;
            word-wrap: break-word;
            white-space: normal;
            line-height: 1.4;
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1a1a2e;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .filters-row {
                flex-direction: column;
            }
            th, td {
                font-size: 0.8em;
                padding: 8px;
            }
            .descripcion-cell {
                max-width: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                <span>👥</span>
                <span>Información de Clientes</span>
                <span style="font-size: 0.6em; color: #666;">(Datos en descripción)</span>
            </h1>
            <div class="user-info">
                <span>👤 <strong id="userName">Cargando...</strong></span>
                <a href="/dashboard" class="btn-dashboard">📊 Dashboard</a>
                <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-container">
            <div class="stat-card">
                <h3>💰 Total Recibido</h3>
                <div class="value" id="totalRecibido">-</div>
            </div>
            <div class="stat-card">
                <h3>📊 Total Transacciones</h3>
                <div class="value" id="totalTransacciones">-</div>
            </div>
            <div class="stat-card">
                <h3>👥 Clientes Únicos</h3>
                <div class="value" id="clientesUnicos">-</div>
            </div>
        </div>

        <!-- Filtros -->
        <div class="filters-section">
            <div class="filters-row">
                <div class="filter-group">
                    <label>🔍 Buscar por Beneficiario (Cuenta)</label>
                    <input type="text" id="filtroBeneficiario" placeholder="Ej: 9205XXXXXXXX7786">
                </div>
                <div class="filter-group">
                    <label>👤 Buscar por Nombre (Descripción)</label>
                    <input type="text" id="filtroNombre" placeholder="Ej: Juan Pérez">
                </div>
                <div class="filter-group">
                    <label>📅 Fecha desde</label>
                    <input type="text" id="fechaInicio" placeholder="DD/MM/YYYY" class="datepicker">
                </div>
                <div class="filter-group">
                    <label>📅 Fecha hasta</label>
                    <input type="text" id="fechaFin" placeholder="DD/MM/YYYY" class="datepicker">
                </div>
                <button class="btn-filter" onclick="aplicarFiltros()">🔍 Aplicar Filtros</button>
                <button class="btn-filter btn-clear" onclick="limpiarFiltros()">🗑️ Limpiar</button>
            </div>
        </div>

        <!-- Tabla de transacciones -->
        <div class="transactions-table">
            <div id="loadingState" style="display: none;">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Cargando transacciones...</p>
                </div>
            </div>
            <div id="tableContainer"></div>
        </div>
    </div>

    <script>
        //const BASE_URL = 'http://localhost:8000';
        const BASE_URL = window.location.origin;
        let token = null;
        let user = null;
        let transaccionesGlobal = [];

        // ========== AUTENTICACIÓN ==========
        function getToken() {
            const params = new URLSearchParams(window.location.search);
            const urlToken = params.get('token');
            if (urlToken) {
                localStorage.setItem('token', urlToken);
                return urlToken;
            }
            return localStorage.getItem('token');
        }

        async function getUserProfile() {
            token = getToken();
            if (!token) {
                window.location.href = '/test';
                return null;
            }

            try {
                const response = await fetch(`${BASE_URL}/perfil`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    user = await response.json();
                    document.getElementById('userName').textContent = `${user.nombre} ${user.apellido}`;
                    return user;
                } else {
                    localStorage.removeItem('token');
                    window.location.href = '/test';
                    return null;
                }
            } catch (error) {
                console.error('Error:', error);
                window.location.href = '/test';
                return null;
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/test';
        }

        // ========== INICIALIZAR DATE PICKERS ==========
        function initDatePickers() {
            flatpickr(".datepicker", {
                locale: "es",
                dateFormat: "d/m/Y",
                allowInput: true,
                altInput: true,
                altFormat: "d/m/Y"
            });
        }

        // ========== EXTRAER NOMBRE DE LA DESCRIPCIÓN ==========
        function extraerNombreDeDescripcion(descripcion) {
            if (!descripcion) return '';
            
            // Buscar patrones comunes
            // Patrón 1: "Pagador: Juan Pérez"
            let match = descripcion.match(/Pagador:\s*([^|]+)/i);
            if (match) return match[1].trim();
            
            // Patrón 2: "QR: Juan Pérez"
            match = descripcion.match(/QR:\s*([^|]+)/i);
            if (match) return match[1].trim();
            
            // Patrón 3: "Nombre: Juan Pérez"
            match = descripcion.match(/Nombre:\s*([^|]+)/i);
            if (match) return match[1].trim();
            
            // Si no hay patrón, devolver la descripción completa truncada
            return descripcion.length > 50 ? descripcion.substring(0, 50) + '...' : descripcion;
        }

        // ========== CARGAR TRANSACCIONES ==========
        async function aplicarFiltros() {
            if (!token) return;

            const filtroBeneficiario = document.getElementById('filtroBeneficiario')?.value || '';
            const filtroNombre = document.getElementById('filtroNombre')?.value || '';
            const fechaInicio = document.getElementById('fechaInicio')?.value || '';
            const fechaFin = document.getElementById('fechaFin')?.value || '';

            const loadingDiv = document.getElementById('loadingState');
            const tableContainer = document.getElementById('tableContainer');
            
            if (loadingDiv) loadingDiv.style.display = 'block';
            if (tableContainer) tableContainer.innerHTML = '';

            try {
                // Construir URL con parámetros
                const params = new URLSearchParams();
                params.append('skip', '0');
                params.append('limit', '1000');
                
                if (fechaInicio) params.append('fecha_inicio', fechaInicio);
                if (fechaFin) params.append('fecha_fin', fechaFin);
                
                let url = `${BASE_URL}/transacciones/?${params.toString()}`;
                
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Error al cargar transacciones');

                let transacciones = await response.json();
                
                // Filtrar por beneficiario
                if (filtroBeneficiario) {
                    transacciones = transacciones.filter(t => 
                        t.beneficiario && t.beneficiario.includes(filtroBeneficiario)
                    );
                }
                
                // Filtrar por nombre en descripción
                if (filtroNombre) {
                    transacciones = transacciones.filter(t => 
                        t.descripcion && t.descripcion.toLowerCase().includes(filtroNombre.toLowerCase())
                    );
                }
                
                // Ordenar por fecha (más reciente primero)
                transacciones.sort((a, b) => {
                    const fechaA = a.fecha ? a.fecha.split('/').reverse().join('-') : '';
                    const fechaB = b.fecha ? b.fecha.split('/').reverse().join('-') : '';
                    return fechaB.localeCompare(fechaA);
                });
                
                transaccionesGlobal = transacciones;
                calcularEstadisticas();
                mostrarTabla();

            } catch (error) {
                console.error('Error:', error);
                if (tableContainer) {
                    tableContainer.innerHTML = `<div class="empty-message">❌ Error: ${error.message}</div>`;
                }
            } finally {
                if (loadingDiv) loadingDiv.style.display = 'none';
            }
        }

        function calcularEstadisticas() {
            // Solo transacciones RECIBIDAS para las estadísticas
            const recibidas = transaccionesGlobal.filter(t => t.tipo === 'recibida');
            const totalRecibido = recibidas.reduce((sum, t) => sum + (t.monto || 0), 0);
            
            // Clientes únicos (por beneficiario)
            const beneficiariosUnicos = new Set(transaccionesGlobal.map(t => t.beneficiario).filter(b => b));
            
            document.getElementById('totalRecibido').textContent = totalRecibido.toLocaleString('es-CU', { minimumFractionDigits: 2 });
            document.getElementById('totalTransacciones').textContent = transaccionesGlobal.length;
            document.getElementById('clientesUnicos').textContent = beneficiariosUnicos.size;
        }

        function mostrarTabla() {
            const tableContainer = document.getElementById('tableContainer');
            
            if (transaccionesGlobal.length === 0) {
                tableContainer.innerHTML = `<div class="empty-message">📭 No hay transacciones para mostrar</div>`;
                return;
            }
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>N° Transacción</th>
                            <th>Beneficiario (Cuenta)</th>
                            <th>Nombre del Cliente</th>
                            <th>Importe</th>
                            <th>Moneda</th>
                            <th>Tipo</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            for (const t of transaccionesGlobal) {
                const tipoClass = t.tipo === 'recibida' ? 'badge-recibida' : 'badge-enviada';
                const estadoClass = t.estado === 'PENDIENTE' ? 'badge-pendiente' : 'badge-confirmada';
                const nombreCliente = extraerNombreDeDescripcion(t.descripcion);
                const tipoText = t.tipo === 'recibida' ? '📥 Recibida' : '📤 Enviada';
                
                html += `
                    <tr>
                        <td>${t.fecha || '-'}</td>
                        <td><strong>${t.numero_transaccion || '-'}</strong></td>
                        <td>${t.beneficiario || '-'}</td>
                        <td class="descripcion-cell"><strong>${nombreCliente || '-'}</strong></td>
                        <td><strong>${(t.monto || 0).toLocaleString('es-CU', { minimumFractionDigits: 2 })}</strong></td>
                        <td>${t.moneda}</td>
                        <td><span class="badge ${tipoClass}">${tipoText}</span></td>
                        <td><span class="badge ${estadoClass}">${t.estado}</span></td>
                    </tr>
                `;
            }
            
            html += `
                    </tbody>
                </table>
            `;
            
            tableContainer.innerHTML = html;
        }

        function limpiarFiltros() {
            document.getElementById('filtroBeneficiario').value = '';
            document.getElementById('filtroNombre').value = '';
            document.getElementById('fechaInicio').value = '';
            document.getElementById('fechaFin').value = '';
            aplicarFiltros();
        }

        // ========== INICIALIZACIÓN ==========
        async function init() {
            await getUserProfile();
            if (user) {
                initDatePickers();
                await aplicarFiltros();
            }
        }

        init();
    </script>
</body>
</html>
