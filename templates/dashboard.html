<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <title>📊 Panel de Transacciones - Gestor Bancario</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* Estilos para botones de exportación */
        .export-buttons {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }

        .btn-export-excel, .btn-export-pdf {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-export-excel {
            background: linear-gradient(135deg, #1e8449 0%, #27ae60 100%);
            color: white;
        }

        .btn-export-excel:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 132, 73, 0.4);
        }

        .btn-export-pdf {
            background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%);
            color: white;
        }

        .btn-export-pdf:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(192, 57, 43, 0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            color: #333;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info span {
            color: #666;
        }

        .user-info strong {
            color: #667eea;
        }

        .logout-btn {
            background: #f56565;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #e53e3e;
            transform: translateY(-2px);
        }

        /* Stats Cards */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }

        .stat-card.enviadas .value { color: #f56565; }
        .stat-card.recibidas .value { color: #48bb78; }
        .stat-card.balance .value { color: #667eea; }
        .stat-card.pendientes .value { color: #ed8936; }

        /* Filtros */
        .filters-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .filters-section h2 {
            color: #333;
            font-size: 1.2em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filters-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1;
            min-width: 150px;
        }

        .filter-group label {
            display: block;
            font-size: 0.8em;
            color: #666;
            margin-bottom: 5px;
        }

        .filter-group input, .filter-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .filter-group input:focus, .filter-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-filter {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-filter:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            color: #666;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-btn:hover:not(.active) {
            background: #f0f0f0;
        }

        /* Tablas */
        .transactions-table {
            background: white;
            border-radius: 15px;
            overflow-x: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .badge-enviada {
            background: #fed7d7;
            color: #c53030;
        }

        .badge-recibida {
            background: #c6f6d5;
            color: #22543d;
        }

        .badge-pendiente {
            background: #feebc8;
            color: #c05621;
        }

        .badge-confirmada {
            background: #c6f6d5;
            color: #22543d;
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .filters-row {
                flex-direction: column;
            }
            
            th, td {
                padding: 10px;
                font-size: 0.85em;
            }
            
            .header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                <span>🏦</span>
                <span>Panel de Transacciones</span>
            </h1>
            <div class="user-info">
                <span>👤 <strong id="userName">Cargando...</strong></span>
                <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-container" id="statsContainer">
            <div class="stat-card enviadas">
                <h3>📤 Total Enviadas</h3>
                <div class="value" id="totalEnviadas">-</div>
            </div>
            <div class="stat-card recibidas">
                <h3>📥 Total Recibidas</h3>
                <div class="value" id="totalRecibidas">-</div>
            </div>
            <div class="stat-card balance">
                <h3>💰 Balance</h3>
                <div class="value" id="balance">-</div>
            </div>
            <div class="stat-card pendientes">
                <h3>⏳ Pendientes</h3>
                <div class="value" id="pendientes">-</div>
            </div>
        </div>
        <!--botones para  exportar  -->
        <div class="export-buttons">
            <button class="btn-export-excel" onclick="exportarExcel()">
                📊 Exportar a Excel
            </button>
            <button class="btn-export-pdf" onclick="exportarPDF()">
                📄 Exportar a PDF
            </button>
        </div>
        <!-- Filtros -->
        <!-- Filtros - Versión mejorada -->
        <div class="filters-section">
            <h2>🔍 Filtrar Transacciones</h2>
            <div class="filters-row">
                <div class="filter-group">
                    <label>📅 Fecha desde</label>
                    <input type="text" id="fechaInicio" placeholder="Seleccionar fecha" class="datepicker">
                </div>
                <div class="filter-group">
                    <label>📅 Fecha hasta</label>
                    <input type="text" id="fechaFin" placeholder="Seleccionar fecha" class="datepicker">
                </div>
                <div class="filter-group">
                    <label>🏦 Banco</label>
                    <input type="text" id="filtroBanco" placeholder="Todos">
                </div>
                <div class="filter-group">
                    <label>💵 Moneda</label>
                    <select id="filtroMoneda">
                        <option value="">Todas</option>
                        <option value="CUP">CUP - Peso Cubano</option>
                        <option value="USD">USD - Dólar</option>
                        <option value="EUR">EUR - Euro</option>
                        <option value="MLC">MLC - Moneda Libremente Convertible</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>📌 Estado</label>
                    <select id="filtroEstado">
                        <option value="">Todos</option>
                        <option value="PENDIENTE">⏳ Pendientes</option>
                        <option value="CONFIRMADA">✅ Confirmadas</option>
                    </select>
                </div>
                <button class="btn-filter" onclick="aplicarFiltros()">🔍 Aplicar Filtros</button>
                <button class="btn-filter" onclick="limpiarFiltros()">🗑️ Limpiar</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="cambiarTab('todas')">📋 Todas</button>
            <button class="tab-btn" onclick="cambiarTab('enviadas')">📤 Enviadas</button>
            <button class="tab-btn" onclick="cambiarTab('recibidas')">📥 Recibidas</button>
        </div>

        <!-- Tabla de transacciones -->
        <div class="transactions-table">
            <div id="loadingState" style="display: none;">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Cargando transacciones...</p>
                </div>
            </div>
            <div id="tableContainer"></div>
        </div>
    </div>

    <script>
        //const BASE_URL = 'http://localhost:8000';

        const BASE_URL = window.location.origin;
        let token = null;
        let user = null;
        let todasLasTransacciones = [];
        let transaccionesFiltradas = [];
        let tabActual = 'todas';

        // ========== AUTENTICACIÓN ==========
        function getTokenFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('token');
        }
        function getToken() {
            const urlToken = getTokenFromUrl();
            if (urlToken) {
                localStorage.setItem('token', urlToken);
                return urlToken;
            }
            return localStorage.getItem('token');
        }
        async function getUserProfile() {
            token = getToken();
            if (!token) {
                window.location.href = '/test';
                return null;
            }
            try {
                const response = await fetch(`${BASE_URL}/perfil`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    user = await response.json();
                    document.getElementById('userName').textContent = `${user.nombre} ${user.apellido}`;
                    return user;
                } else {
                    localStorage.removeItem('token');
                    window.location.href = '/test';
                    return null;
                }
            } catch (error) {
                console.error('Error perfil:', error);
                window.location.href = '/test';
                return null;
            }
        }
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/test';
        }

        // ========== FUNCIONES DE FECHA ==========
        function normalizarFecha(fechaStr) {
            if (!fechaStr) return '';
            if (/^\d{4}-\d{2}-\d{2}$/.test(fechaStr)) return fechaStr;
            const partes = fechaStr.split('/');
            if (partes.length === 3) {
                const [dia, mes, anio] = partes;
                return `${anio}-${mes.padStart(2, '0')}-${dia.padStart(2, '0')}`;
            }
            return fechaStr;
        }
        function formatearFecha(fechaStr) {
            if (!fechaStr) return '-';
            if (fechaStr.includes('/')) return fechaStr;
            const partes = fechaStr.split('-');
            if (partes.length === 3) {
                const [anio, mes, dia] = partes;
                return `${dia}/${mes}/${anio}`;
            }
            return fechaStr;
        }

        // ========== DATE PICKERS ==========
        function initDatePickers() {
            flatpickr("#fechaInicio", { locale: "es", dateFormat: "d/m/Y", allowInput: true });
            flatpickr("#fechaFin", { locale: "es", dateFormat: "d/m/Y", allowInput: true });
        }

        // ========== CARGAR TODAS LAS TRANSACCIONES ==========
        async function cargarTodasTransacciones() {
            token = getToken();
            if (!token) return [];
            const url = `${BASE_URL}/transacciones/?skip=0&limit=2000`;
            const response = await fetch(url, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!response.ok) throw new Error('Error al cargar transacciones');
            let data = await response.json();
            return data.map(t => ({
                ...t,
                tipo: t.tipo || (t.monto > 0 ? 'recibida' : 'enviada'),
                fechaOriginal: normalizarFecha(t.fecha),
                fecha: formatearFecha(normalizarFecha(t.fecha))
            }));
        }

        // ========== APLICAR FILTROS ==========
        async function aplicarFiltros() {
            token = getToken();
            if (!token) return;

            const loadingDiv = document.getElementById('loadingState');
            const tableContainer = document.getElementById('tableContainer');
            loadingDiv.style.display = 'block';
            tableContainer.innerHTML = '';

            try {
                if (todasLasTransacciones.length === 0) {
                    todasLasTransacciones = await cargarTodasTransacciones();
                    console.log('📦 Total transacciones cargadas:', todasLasTransacciones.length);
                }

                let fechaInicioStr = document.getElementById('fechaInicio')?.value || '';
                let fechaFinStr = document.getElementById('fechaFin')?.value || '';
                const moneda = document.getElementById('filtroMoneda')?.value || '';
                const estado = document.getElementById('filtroEstado')?.value || '';

                const fechaInicio = normalizarFecha(fechaInicioStr);
                const fechaFin = normalizarFecha(fechaFinStr);

                let filtradas = todasLasTransacciones.filter(t => {
                    const fechaTransaccion = t.fechaOriginal || '';
                    if (fechaInicio && fechaTransaccion < fechaInicio) return false;
                    if (fechaFin && fechaTransaccion > fechaFin) return false;
                    if (moneda && t.moneda !== moneda) return false;
                    if (estado && t.estado !== estado) return false;
                    if (tabActual === 'enviadas' && t.tipo !== 'enviada') return false;
                    if (tabActual === 'recibidas' && t.tipo !== 'recibida') return false;
                    return true;
                });

                filtradas.sort((a, b) => (b.fechaOriginal || '').localeCompare(a.fechaOriginal || ''));
                transaccionesFiltradas = filtradas;
                actualizarEstadisticas();
                renderizarTabla();
            } catch (error) {
                console.error(error);
                tableContainer.innerHTML = `<div class="empty-message">❌ Error: ${error.message}</div>`;
            } finally {
                loadingDiv.style.display = 'none';
            }
        }

        // ========== ESTADÍSTICAS ==========
        function actualizarEstadisticas() {
            const enviadas = transaccionesFiltradas.filter(t => t.tipo === 'enviada');
            const recibidas = transaccionesFiltradas.filter(t => t.tipo === 'recibida');
            const totalEnviadas = enviadas.reduce((sum, t) => sum + (t.monto || 0), 0);
            const totalRecibidas = recibidas.reduce((sum, t) => sum + (t.monto || 0), 0);
            const pendientes = transaccionesFiltradas.filter(t => t.estado === 'PENDIENTE').length;

            document.getElementById('totalEnviadas').textContent = totalEnviadas.toFixed(2);
            document.getElementById('totalRecibidas').textContent = totalRecibidas.toFixed(2);
            document.getElementById('balance').textContent = (totalRecibidas - totalEnviadas).toFixed(2);
            document.getElementById('pendientes').textContent = pendientes;
        }

        // ========== RENDERIZAR TABLA (CORREGIDA, SIN DUPLICADOS) ==========
        function renderizarTabla() {
            const container = document.getElementById('tableContainer');
            if (!transaccionesFiltradas.length) {
                container.innerHTML = '<div class="empty-message">📭 No hay transacciones con los filtros actuales</div>';
                return;
            }

            // Debug: ver la primera transacción
            console.log('Primera transacción:', transaccionesFiltradas[0]);

            let html = '<table class="transactions-table" style="width:100%; border-collapse: collapse;">';
            html += '<thead><tr>';
            html += '<th>Fecha</th><th>N° Transacción</th><th>Tipo</th><th>Beneficiario</th><th>Ordenante</th><th>Monto</th><th>Moneda</th><th>Estado</th><th>Fecha Confirmación</th>';
            html += '</tr></thead><tbody>';

            for (const t of transaccionesFiltradas) {
                const tipoClass = t.tipo === 'enviada' ? 'badge-enviada' : 'badge-recibida';
                const estadoClass = t.estado === 'PENDIENTE' ? 'badge-pendiente' : 'badge-confirmada';
                let fechaConfirm = '-';
                if (t.fecha_confirmacion) {
                    fechaConfirm = new Date(t.fecha_confirmacion).toLocaleString();
                }
                html += `<tr>
                    <td>${t.fecha}</td>
                    <td><strong>${t.numero_transaccion || '-'}</strong></td>
                    <td><span class="badge ${tipoClass}">${t.tipo === 'enviada' ? '📤 Enviada' : '📥 Recibida'}</span></td>
                    <td>${t.beneficiario || '-'}</td>
                    <td>${t.ordenante || '-'}</td>
                    <td><strong>${(t.monto || 0).toFixed(2)}</strong></td>
                    <td>${t.moneda}</td>
                    <td><span class="badge ${estadoClass}">${t.estado}</span></td>
                    <td>${fechaConfirm}</td>
                </tr>`;
            }
            html += '</tbody></table>';
            
            console.log('HTML generado:', html.substring(0, 200));
            container.innerHTML = html;
        }

        // ========== CAMBIAR PESTAÑA ==========
        function cambiarTab(tab) {
            tabActual = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const btns = document.querySelectorAll('.tab-btn');
            if (tab === 'todas') btns[0].classList.add('active');
            else if (tab === 'enviadas') btns[1].classList.add('active');
            else if (tab === 'recibidas') btns[2].classList.add('active');
            aplicarFiltros();
        }

        function limpiarFiltros() {
            document.getElementById('fechaInicio').value = '';
            document.getElementById('fechaFin').value = '';
            document.getElementById('filtroMoneda').value = '';
            document.getElementById('filtroEstado').value = '';
            aplicarFiltros();
        }
        // ========== EXPORTAR A EXCEL (CLIENTE) ==========
        async function exportarExcel() {
            if (!transaccionesFiltradas.length) {
                mostrarMensajeTemporal('⚠️ No hay datos para exportar', 'error');
                alert("Debes Filtrar Transaciones...")
                return;
            }

            // Preparar los datos para la hoja de cálculo
            const datos = transaccionesFiltradas.map(t => ({
                'Fecha': t.fecha || '',
                'N° Transacción': t.numero_transaccion || '',
                'Tipo': t.tipo === 'enviada' ? 'Enviada' : 'Recibida',
                'Beneficiario': t.beneficiario || '',
                'Ordenante': t.ordenante || '',
                'Monto': (t.monto || 0).toFixed(2),
                'Moneda': t.moneda || '',
                'Estado': t.estado || '',
                'Fecha Confirmación': t.fecha_confirmacion ? new Date(t.fecha_confirmacion).toLocaleString() : ''
            }));

            // Crear hoja de trabajo
            const ws = XLSX.utils.json_to_sheet(datos);
            // Ajustar anchos de columna (opcional)
            const wscols = [
                {wch:12}, {wch:18}, {wch:10}, {wch:25}, {wch:25}, {wch:12}, {wch:8}, {wch:12}, {wch:20}
            ];
            ws['!cols'] = wscols;

            // Crear libro y descargar
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Transacciones');
            XLSX.writeFile(wb, `transacciones_${new Date().toISOString().slice(0,19)}.xlsx`);
            mostrarMensajeTemporal('✅ Excel exportado correctamente', 'success');
        }

        // ========== EXPORTAR A PDF (CLIENTE) ==========
        // ========== EXPORTAR A PDF (CLIENTE) CON RESUMEN DE MONTOS Y RANGO DE FECHAS ==========
        async function exportarPDF() {
            if (!transaccionesFiltradas.length) {
                mostrarMensajeTemporal('⚠️ No hay datos para exportar', 'error');
                return;
            }

            // Obtener el rango de fechas de los filtros actuales
            let fechaInicioRaw = document.getElementById('fechaInicio')?.value || '';
            let fechaFinRaw = document.getElementById('fechaFin')?.value || '';
            // Formatear para mostrar en el título (DD/MM/YYYY) tal como se ingresó
            const rangoTexto = (fechaInicioRaw && fechaFinRaw) 
                ? `${fechaInicioRaw} - ${fechaFinRaw}`
                : (fechaInicioRaw ? `Desde ${fechaInicioRaw}` : (fechaFinRaw ? `Hasta ${fechaFinRaw}` : 'Todos los períodos'));

            // Calcular totales
            const totalMonto = transaccionesFiltradas.reduce((sum, t) => sum + (t.monto || 0), 0);
            const pendientesCount = transaccionesFiltradas.filter(t => t.estado === 'PENDIENTE').length;
            const confirmadasCount = transaccionesFiltradas.filter(t => t.estado === 'CONFIRMADA').length;
            const enviadasCount = transaccionesFiltradas.filter(t => t.tipo === 'enviada').length;
            const recibidasCount = transaccionesFiltradas.filter(t => t.tipo === 'recibida').length;
            
            // Sumas de montos por estado
            const montoPendientes = transaccionesFiltradas
                .filter(t => t.estado === 'PENDIENTE')
                .reduce((sum, t) => sum + (t.monto || 0), 0);
            const montoConfirmadas = transaccionesFiltradas
                .filter(t => t.estado === 'CONFIRMADA')
                .reduce((sum, t) => sum + (t.monto || 0), 0);

            // Crear elemento contenedor para el PDF
            const printContent = document.createElement('div');
            printContent.style.padding = '15px';
            printContent.style.fontFamily = 'Arial, sans-serif';
            printContent.style.fontSize = '12px';

            // Título con rango de fechas
            const title = document.createElement('h2');
            title.textContent = `Reporte de Transacciones - ${rangoTexto}`;
            title.style.textAlign = 'center';
            title.style.color = '#1e3c72';
            title.style.margin = '0 0 10px 0';
            printContent.appendChild(title);

            // Fecha de generación
            const fechaGen = document.createElement('p');
            fechaGen.textContent = `Generado el: ${new Date().toLocaleString()}`;
            fechaGen.style.textAlign = 'center';
            fechaGen.style.marginBottom = '15px';
            printContent.appendChild(fechaGen);

            // Resumen con totales y montos por estado
            const resumenDiv = document.createElement('div');
            resumenDiv.style.display = 'flex';
            resumenDiv.style.flexWrap = 'wrap';
            resumenDiv.style.justifyContent = 'space-between';
            resumenDiv.style.backgroundColor = '#f0f0f0';
            resumenDiv.style.padding = '10px';
            resumenDiv.style.borderRadius = '8px';
            resumenDiv.style.marginBottom = '20px';
            resumenDiv.innerHTML = `
                <div><strong>📊 Total transacciones:</strong> ${transaccionesFiltradas.length}</div>
                <div><strong>💰 Monto total:</strong> ${totalMonto.toFixed(2)}</div>
                <div><strong>⏳ Pendientes:</strong> ${pendientesCount} (Monto: ${montoPendientes.toFixed(2)})</div>
                <div><strong>✅ Confirmadas:</strong> ${confirmadasCount} (Monto: ${montoConfirmadas.toFixed(2)})</div>
                <div><strong>📤 Enviadas:</strong> ${enviadasCount}</div>
                <div><strong>📥 Recibidas:</strong> ${recibidasCount}</div>
            `;
            printContent.appendChild(resumenDiv);

            // Tabla de transacciones (igual que antes)
            const table = document.createElement('table');
            table.style.width = '100%';
            table.style.borderCollapse = 'collapse';
            table.style.border = '1px solid #ddd';
            table.style.fontSize = '11px';

            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            const headers = ['Fecha', 'N° Transacción', 'Tipo', 'Beneficiario', 'Ordenante', 'Monto', 'Moneda', 'Estado', 'Fecha Confirmación'];
            headers.forEach(text => {
                const th = document.createElement('th');
                th.textContent = text;
                th.style.border = '1px solid #ddd';
                th.style.padding = '6px';
                th.style.backgroundColor = '#f2f2f2';
                th.style.textAlign = 'left';
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            for (const t of transaccionesFiltradas) {
                const row = document.createElement('tr');
                const cells = [
                    t.fecha || '',
                    t.numero_transaccion || '',
                    t.tipo === 'enviada' ? 'Enviada' : 'Recibida',
                    t.beneficiario || '',
                    t.ordenante || '',
                    (t.monto || 0).toFixed(2),
                    t.moneda || '',
                    t.estado || '',
                    t.fecha_confirmacion ? new Date(t.fecha_confirmacion).toLocaleString() : ''
                ];
                cells.forEach(cellText => {
                    const td = document.createElement('td');
                    td.textContent = cellText;
                    td.style.border = '1px solid #ddd';
                    td.style.padding = '6px';
                    row.appendChild(td);
                });
                tbody.appendChild(row);
            }
            table.appendChild(tbody);
            printContent.appendChild(table);

            // Pie de firma
            const firmaDiv = document.createElement('div');
            firmaDiv.style.marginTop = '30px';
            firmaDiv.style.textAlign = 'right';
            firmaDiv.style.fontStyle = 'italic';
            firmaDiv.style.borderTop = '1px solid #ccc';
            firmaDiv.style.paddingTop = '10px';
            const usuarioNombre = user ? `${user.nombre} ${user.apellido}` : 'Usuario';
            firmaDiv.innerHTML = `
                <p>Firma: ___________________________</p>
                <p>${usuarioNombre}</p>
                <p>${new Date().toLocaleDateString()}</p>
            `;
            printContent.appendChild(firmaDiv);

            // Opciones para html2pdf (horizontal landscape)
            const opt = {
                margin:        [0.5, 0.5, 0.5, 0.5],
                filename:     `transacciones_${new Date().toISOString().slice(0,19)}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, letterRendering: true },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'landscape' }
            };

            html2pdf().set(opt).from(printContent).save();
            mostrarMensajeTemporal('📄 PDF exportado correctamente', 'success');
        }        
        // ========== EXPORTACIONES ==========
        async function resumenExportarExcel() {
            token = getToken();
            if (!token) return;
            try {
                mostrarMensajeTemporal('📊 Generando Excel...', 'success');
                const response = await fetch(`${BASE_URL}/transacciones/exportar/excel`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'transacciones.xlsx';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    a.remove();
                    mostrarMensajeTemporal('✅ Excel descargado', 'success');
                } else throw new Error('Error exportar');
            } catch (error) {
                mostrarMensajeTemporal(`❌ ${error.message}`, 'error');
            }
        }
        async function ResumenExportarPDF() {
            token = getToken();
            if (!token) return;
            try {
                mostrarMensajeTemporal('📄 Generando PDF...', 'success');
                const response = await fetch(`${BASE_URL}/transacciones/exportar/pdf`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'transacciones.pdf';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    a.remove();
                    mostrarMensajeTemporal('✅ PDF descargado', 'success');
                } else throw new Error('Error exportar');
            } catch (error) {
                mostrarMensajeTemporal(`❌ ${error.message}`, 'error');
            }
        }
        function mostrarMensajeTemporal(mensaje, tipo) {
            const msgDiv = document.createElement('div');
            msgDiv.textContent = mensaje;
            msgDiv.style.cssText = `position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; background: ${tipo === 'success' ? '#48bb78' : '#f56565'}; color: white; border-radius: 8px; font-weight: 600; z-index: 1000; animation: fadeInOut 3s ease-in-out;`;
            document.body.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 3000);
        }

        // ========== INICIALIZACIÓN ==========
        async function init() {
            await getUserProfile();
            if (user) {
                initDatePickers();
                await aplicarFiltros();
            }
        }
        if (!document.querySelector('#customFadeKeyframes')) {
            const style = document.createElement('style');
            style.id = 'customFadeKeyframes';
            style.textContent = `@keyframes fadeInOut { 0% { opacity:0; transform:translateY(20px); } 15% { opacity:1; transform:translateY(0); } 85% { opacity:1; } 100% { opacity:0; transform:translateY(20px); } }`;
            document.head.appendChild(style);
        }
        init();
    </script>
</body>
</html>
