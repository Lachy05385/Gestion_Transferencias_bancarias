<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
    <title>📊 Panel de Transacciones - Gestor Bancario</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* Estilos para botones de exportación */
        .export-buttons {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }

        .btn-export-excel, .btn-export-pdf {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-export-excel {
            background: linear-gradient(135deg, #1e8449 0%, #27ae60 100%);
            color: white;
        }

        .btn-export-excel:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 132, 73, 0.4);
        }

        .btn-export-pdf {
            background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%);
            color: white;
        }

        .btn-export-pdf:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(192, 57, 43, 0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            color: #333;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info span {
            color: #666;
        }

        .user-info strong {
            color: #667eea;
        }

        .logout-btn {
            background: #f56565;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #e53e3e;
            transform: translateY(-2px);
        }

        /* Stats Cards */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }

        .stat-card.enviadas .value { color: #f56565; }
        .stat-card.recibidas .value { color: #48bb78; }
        .stat-card.balance .value { color: #667eea; }
        .stat-card.pendientes .value { color: #ed8936; }

        /* Filtros */
        .filters-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .filters-section h2 {
            color: #333;
            font-size: 1.2em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filters-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1;
            min-width: 150px;
        }

        .filter-group label {
            display: block;
            font-size: 0.8em;
            color: #666;
            margin-bottom: 5px;
        }

        .filter-group input, .filter-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .filter-group input:focus, .filter-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-filter {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-filter:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            color: #666;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-btn:hover:not(.active) {
            background: #f0f0f0;
        }

        /* Tablas */
        .transactions-table {
            background: white;
            border-radius: 15px;
            overflow-x: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .badge-enviada {
            background: #fed7d7;
            color: #c53030;
        }

        .badge-recibida {
            background: #c6f6d5;
            color: #22543d;
        }

        .badge-pendiente {
            background: #feebc8;
            color: #c05621;
        }

        .badge-confirmada {
            background: #c6f6d5;
            color: #22543d;
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .filters-row {
                flex-direction: column;
            }
            
            th, td {
                padding: 10px;
                font-size: 0.85em;
            }
            
            .header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                <span>🏦</span>
                <span>Panel de Transacciones</span>
            </h1>
            <div class="user-info">
                <span>👤 <strong id="userName">Cargando...</strong></span>
                <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-container" id="statsContainer">
            <div class="stat-card enviadas">
                <h3>📤 Total Enviadas</h3>
                <div class="value" id="totalEnviadas">-</div>
            </div>
            <div class="stat-card recibidas">
                <h3>📥 Total Recibidas</h3>
                <div class="value" id="totalRecibidas">-</div>
            </div>
            <div class="stat-card balance">
                <h3>💰 Balance</h3>
                <div class="value" id="balance">-</div>
            </div>
            <div class="stat-card pendientes">
                <h3>⏳ Pendientes</h3>
                <div class="value" id="pendientes">-</div>
            </div>
        </div>
        <!--botones para  exportar  -->
        <div class="export-buttons">
            <button class="btn-export-excel" onclick="exportarExcel()">
                📊 Exportar a Excel
            </button>
            <button class="btn-export-pdf" onclick="exportarPDF()">
                📄 Exportar a PDF
            </button>
        </div>
        <!-- Filtros -->
        <!-- Filtros - Versión mejorada -->
        <div class="filters-section">
            <h2>🔍 Filtrar Transacciones</h2>
            <div class="filters-row">
                <div class="filter-group">
                    <label>📅 Fecha desde</label>
                    <input type="text" id="fechaInicio" placeholder="Seleccionar fecha" class="datepicker">
                </div>
                <div class="filter-group">
                    <label>📅 Fecha hasta</label>
                    <input type="text" id="fechaFin" placeholder="Seleccionar fecha" class="datepicker">
                </div>
                <div class="filter-group">
                    <label>🏦 Banco</label>
                    <input type="text" id="filtroBanco" placeholder="Todos">
                </div>
                <div class="filter-group">
                    <label>💵 Moneda</label>
                    <select id="filtroMoneda">
                        <option value="">Todas</option>
                        <option value="CUP">CUP - Peso Cubano</option>
                        <option value="USD">USD - Dólar</option>
                        <option value="EUR">EUR - Euro</option>
                        <option value="MLC">MLC - Moneda Libremente Convertible</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>📌 Estado</label>
                    <select id="filtroEstado">
                        <option value="">Todos</option>
                        <option value="PENDIENTE">⏳ Pendientes</option>
                        <option value="CONFIRMADA">✅ Confirmadas</option>
                    </select>
                </div>
                <button class="btn-filter" onclick="aplicarFiltros()">🔍 Aplicar Filtros</button>
                <button class="btn-filter" onclick="limpiarFiltros()">🗑️ Limpiar</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="cambiarTab('todas')">📋 Todas</button>
            <button class="tab-btn" onclick="cambiarTab('enviadas')">📤 Enviadas</button>
            <button class="tab-btn" onclick="cambiarTab('recibidas')">📥 Recibidas</button>
        </div>

        <!-- Tabla de transacciones -->
        <div class="transactions-table">
            <div id="loadingState" style="display: none;">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Cargando transacciones...</p>
                </div>
            </div>
            <div id="tableContainer"></div>
        </div>
    </div>

    <script>
        //const BASE_URL = 'http://localhost:8000';
        const BASE_URL = window.location.origin;
        let token = null;
        let user = null;
        let transacciones = [];
        let tabActual = 'todas';

        // ========== FUNCIONES DE AUTENTICACIÓN ==========
        
        function getTokenFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('token');
        }

        function saveToken(token) {
            localStorage.setItem('token', token);
        }

        function getToken() {
            const urlToken = getTokenFromUrl();
            if (urlToken) {
                saveToken(urlToken);
                return urlToken;
            }
            return localStorage.getItem('token');
        }

        async function getUserProfile() {
            const token = getToken();
            if (!token) {
                window.location.href = '/test';
                return null;
            }

            try {
                const response = await fetch(`${BASE_URL}/perfil`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    user = await response.json();
                    document.getElementById('userName').textContent = `${user.nombre} ${user.apellido}`;
                    return user;
                } else {
                    localStorage.removeItem('token');
                    window.location.href = '/test';
                    return null;
                }
            } catch (error) {
                console.error('Error obteniendo perfil:', error);
                window.location.href = '/test';
                return null;
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/test';
        }

        // ========== FUNCIONES DE TRANSACCIONES ==========

        async function aplicarFiltros() {
            const token = getToken();
            if (!token) return;

            // Obtener valores de los filtros
            const fechaInicio = document.getElementById('fechaInicio').value;
            const fechaFin = document.getElementById('fechaFin').value;
            const filtroBanco = document.getElementById('filtroBanco').value;
            const filtroMoneda = document.getElementById('filtroMoneda').value;
            const filtroEstado = document.getElementById('filtroEstado').value;
            const tipo = tabActual === 'todas' ? null : tabActual;
            
            const loadingDiv = document.getElementById('loadingState');
            const tableContainer = document.getElementById('tableContainer');
            
            loadingDiv.style.display = 'block';
            tableContainer.innerHTML = '';

            try {
                // Construir URL con parámetros
                const params = new URLSearchParams();

                
                
                if (fechaInicio) params.append('fecha_inicio', fechaInicio);
                if (fechaFin) params.append('fecha_fin', fechaFin);
                if (filtroBanco) params.append('banco', filtroBanco);
                if (filtroMoneda) params.append('moneda', filtroMoneda);
                if (filtroEstado) params.append('estado', filtroEstado);
                if (tipo && tabActual !== 'todas') params.append('tipo', tipo);
                
                // 👇 USAR EL MISMO ENDPOINT PARA TODO
                const url = `${BASE_URL}/transacciones/?${params.toString()}`;
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    throw new Error('Error al cargar transacciones');
                }

                let transacciones = await response.json();
                
                // Filtro por moneda (si el backend no lo soporta)
                if (filtroMoneda) {
                    transacciones = transacciones.filter(t => t.moneda === filtroMoneda);
                }
                
                // Guardar en variable global
                window.transaccionesGlobal = transacciones;
                
                // Calcular estadísticas
                calcularEstadisticas();
                
                // Mostrar según tab actual
                mostrarTabla();

            } catch (error) {
                console.error('Error:', error);
                tableContainer.innerHTML = `
                    <div class="empty-message">
                        ❌ Error al cargar las transacciones<br>
                        <small>${error.message}</small>
                    </div>
                `;
            } finally {
                loadingDiv.style.display = 'none';
            }
        }

        // Función para limpiar filtros
        function limpiarFiltros() {
            document.getElementById('fechaInicio').value = '';
            document.getElementById('fechaFin').value = '';
            document.getElementById('filtroBanco').value = '';
            document.getElementById('filtroMoneda').value = '';
            document.getElementById('filtroEstado').value = '';
            
            // Recargar sin filtros
            aplicarFiltros();
        }
                
        
        
        
        
        async function cargarTransacciones() {
            const token = getToken();
            if (!token) return;

            const loadingDiv = document.getElementById('loadingState');
            const tableContainer = document.getElementById('tableContainer');
            
            loadingDiv.style.display = 'block';
            tableContainer.innerHTML = '';

            try {
                const fechaInicio = document.getElementById('fechaInicio').value;
                const fechaFin = document.getElementById('fechaFin').value;
                const filtroBanco = document.getElementById('filtroBanco').value;
                const filtroMoneda = document.getElementById('filtroMoneda').value;

                // Construir URL con parámetros
                let url = `${BASE_URL}/transacciones/?`;
                const params = [];
                
                if (fechaInicio && fechaFin) {
                    // Usar el endpoint por fecha si está disponible
                    url = `${BASE_URL}/transacciones/recibidas/por-fecha?fecha_inicio=${fechaInicio}&fecha_fin=${fechaFin}`;
                } else {
                   // if (filtroBanco) params.push(`banco=${encodeURIComponent(filtroBanco)}`);
                }
                
                const finalUrl = params.length ? `${BASE_URL}/transacciones/?${params.join('&')}` : `${BASE_URL}/transacciones/`;
                
                let response = await fetch(finalUrl, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Error al cargar transacciones');
                }

                let allTransacciones = await response.json();
                
                // Aplicar filtros adicionales en cliente
                transacciones = allTransacciones.filter(t => {
                    if (filtroBanco && !t.banco.toLowerCase().includes(filtroBanco.toLowerCase())) return false;
                    if (filtroMoneda && t.moneda !== filtroMoneda) return false;
                    return true;
                });


                // Calcular estadísticas
                calcularEstadisticas();
                
                // Mostrar según tab actual
                mostrarTabla();

            } catch (error) {
                console.error('Error:', error);
                tableContainer.innerHTML = `
                    <div class="empty-message">
                        ❌ Error al cargar las transacciones<br>
                        <small>${error.message}</small>
                    </div>
                `;
            } finally {
                loadingDiv.style.display = 'none';
            }
        }

        function calcularEstadisticas() {
            // 👇 Usar la variable global, no la local
            const todasTransacciones = window.transaccionesGlobal || [];
            
            // Aplicar filtro de tab actual para las estadísticas
            let transacciones = todasTransacciones;
            if (tabActual === 'enviadas') {
                transacciones = todasTransacciones.filter(t => t.tipo === 'enviada');
            } else if (tabActual === 'recibidas') {
                transacciones = todasTransacciones.filter(t => t.tipo === 'recibida');
            }
            
            const enviadas = transacciones.filter(t => t.tipo === 'enviada');
            const recibidas = transacciones.filter(t => t.tipo === 'recibida');
            
            const totalEnviadas = enviadas.reduce((sum, t) => sum + (t.monto || 0), 0);
            const totalRecibidas = recibidas.reduce((sum, t) => sum + (t.monto || 0), 0);
            const pendientes = transacciones.filter(t => t.estado === 'PENDIENTE').length;
            
            // Actualizar el DOM
            const totalEnviadasEl = document.getElementById('totalEnviadas');
            const totalRecibidasEl = document.getElementById('totalRecibidas');
            const balanceEl = document.getElementById('balance');
            const pendientesEl = document.getElementById('pendientes');
            
            if (totalEnviadasEl) totalEnviadasEl.textContent = totalEnviadas.toFixed(2);
            if (totalRecibidasEl) totalRecibidasEl.textContent = totalRecibidas.toFixed(2);
            if (balanceEl) balanceEl.textContent = (totalRecibidas - totalEnviadas).toFixed(2);
            if (pendientesEl) pendientesEl.textContent = pendientes;
            
            console.log('📊 Estadísticas actualizadas:', {
                totalEnviadas: totalEnviadas.toFixed(2),
                totalRecibidas: totalRecibidas.toFixed(2),
                balance: (totalRecibidas - totalEnviadas).toFixed(2),
                pendientes: pendientes
            });
        }

        function mostrarTabla() {
            const tableContainer = document.getElementById('tableContainer');
            
            // Usar las transacciones filtradas globalmente
            let transacciones = window.transaccionesGlobal || [];
            
            // Filtrar según la tab actual (Todas/Enviadas/Recibidas)
            if (tabActual === 'enviadas') {
                transacciones = transacciones.filter(t => t.tipo === 'enviada');
            } else if (tabActual === 'recibidas') {
                transacciones = transacciones.filter(t => t.tipo === 'recibida');
            }
            
            if (transacciones.length === 0) {
                tableContainer.innerHTML = `
                    <div class="empty-message">
                        📭 No hay transacciones para mostrar<br>
                        <small>Prueba cambiando los filtros</small>
                    </div>
                `;
                return;
            }
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>N° Transacción</th>
                            <th>Tipo</th>
                            <th>Beneficiario</th>
                            <th>Ordenante</th>
                            <th>Monto</th>
                            <th>Moneda</th>
                            <th>Banco</th>
                            <th>Estado</th>
                            <th>Fecha Confirmación</th>
                           !<-- <th>Confirmar</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            for (const t of transacciones) {
                const tipoClass = t.tipo === 'enviada' ? 'badge-enviada' : 'badge-recibida';
                const estadoClass = t.estado === 'PENDIENTE' ? 'badge-pendiente' : 'badge-confirmada';
                const isChecked = t.estado === 'CONFIRMADA';
                
                // Formatear fecha de confirmación
                let fechaConfirmacionHtml = '-';
                if (t.fecha_confirmacion) {
                    const fecha = new Date(t.fecha_confirmacion);
                    fechaConfirmacionHtml = fecha.toLocaleString();
                }
                
                html += `
                    <tr data-id="${t.id}">
                        <td>${t.fecha || '-'}</td>
                        <td><strong>${t.numero_transaccion || '-'}</strong></td>
                        <td><span class="badge ${tipoClass}">${t.tipo === 'enviada' ? '📤 Enviada' : '📥 Recibida'}</span></td>
                        <td>${t.beneficiario || '-'}</td>
                        <td>${t.ordenante || '-'}</td>
                        <td><strong>${t.monto.toFixed(2)}</strong></td>
                        <td>${t.moneda}</td>
                        <td>${t.banco || '-'}</td>
                        <td><span class="badge ${estadoClass}" id="estado-${t.id}">${t.estado}</span></td>
                        <td>${fechaConfirmacionHtml}</td>
                        <!-- quitar check -->
                        <td>
                            <input type="checkbox" 
                                class="confirm-checkbox" 
                                data-id="${t.id}"
                                ${isChecked ? 'checked disabled' : ''}
                                ${t.estado === 'CONFIRMADA' ? 'disabled' : ''}
                                onchange="cambiarEstado(${t.id}, this.checked)">
                        </td>
                    </tr>
                `;
            }
            
            html += `
                    </tbody>
                </table>
            `;
            
            tableContainer.innerHTML = html;
        }

        function cambiarTab(tab) {
            tabActual = tab;
            
            // Actualizar estilos de tabs
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            mostrarTabla();
        }

        function limpiarFiltros() {
            document.getElementById('fechaInicio').value = '';
            document.getElementById('fechaFin').value = '';
            document.getElementById('filtroBanco').value = '';
            document.getElementById('filtroMoneda').value = '';
            cargarTransacciones();
        }

        async function cambiarEstado(transaccionId, confirmado) {
            if (!confirmado) return;
            
            const confirmar = confirm('¿Confirmar que esta transacción ya aparece en tu estado de cuenta?');
            if (!confirmar) {
                const checkbox = document.querySelector(`.confirm-checkbox[data-id="${transaccionId}"]`);
                if (checkbox) checkbox.checked = false;
                return;
            }
            
            try {
                const token = getToken();
                const checkbox = document.querySelector(`.confirm-checkbox[data-id="${transaccionId}"]`);
                if (checkbox) checkbox.disabled = true;
                
                // 👇 Usar el endpoint específico de confirmación
                const response = await fetch(`${BASE_URL}/transacciones/${transaccionId}/confirmar`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    // Actualizar visualmente
                    const estadoSpan = document.getElementById(`estado-${transaccionId}`);
                    if (estadoSpan) {
                        estadoSpan.textContent = 'CONFIRMADA';
                        estadoSpan.className = 'badge badge-confirmada';
                    }
                    if (checkbox) {
                        checkbox.checked = true;
                        checkbox.disabled = true;
                    }
                    
                    // Mostrar mensaje con la fecha
                    const data = await response.json();
                    const fechaConfirmacion = data.fecha_confirmacion ? new Date(data.fecha_confirmacion).toLocaleString() : '';
                    mostrarMensajeTemporal(`✅ Transacción confirmada el ${fechaConfirmacion}`, 'success');
                    
                    setTimeout(() => cargarTransacciones(), 500);
                } else {
                    const error = await response.json();
                    throw new Error(error.detail || 'Error al confirmar');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarMensajeTemporal(`❌ Error: ${error.message}`, 'error');
                const checkbox = document.querySelector(`.confirm-checkbox[data-id="${transaccionId}"]`);
                if (checkbox) {
                    checkbox.checked = false;
                    checkbox.disabled = false;
                }
            }
        }


        function mostrarMensajeTemporal(mensaje, tipo) {
            // Crear elemento de mensaje flotante
            const msgDiv = document.createElement('div');
            msgDiv.textContent = mensaje;
            msgDiv.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                padding: 12px 20px;
                background: ${tipo === 'success' ? '#48bb78' : '#f56565'};
                color: white;
                border-radius: 8px;
                font-weight: 600;
                z-index: 1000;
                animation: fadeInOut 3s ease-in-out;
            `;
            document.body.appendChild(msgDiv);
            
            // Eliminar después de 3 segundos
            setTimeout(() => {
                msgDiv.remove();
            }, 3000);
        }

        // Agregar animación CSS (ponerlo en el style)
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInOut {
                0% { opacity: 0; transform: translateY(20px); }
                15% { opacity: 1; transform: translateY(0); }
                85% { opacity: 1; transform: translateY(0); }
                100% { opacity: 0; transform: translateY(20px); }
            }
        `;
        document.head.appendChild(style);

        // ========== INICIALIZACIÓN ==========
        function initDatePickers() {
            // Verificar que los elementos existen antes de inicializar
            const fechaInicio = document.getElementById('fechaInicio');
            const fechaFin = document.getElementById('fechaFin');
            
            if (!fechaInicio || !fechaFin) {
                console.log('⚠️ Elementos de fecha no encontrados, omitiendo datepickers');
                return;
            }
            
            // Configuración del calendario
            flatpickr("#fechaInicio", {
                locale: "es",
                dateFormat: "d/m/Y",
                allowInput: true,
                altInput: true,
                altFormat: "d/m/Y"
            });
            
            flatpickr("#fechaFin", {
                locale: "es",
                dateFormat: "d/m/Y",
                allowInput: true,
                altInput: true,
                altFormat: "d/m/Y"
            });
        
            
            // Opcional: Establecer fechas por defecto (últimos 30 días)
            // const hoy = new Date();
            // const hace30Dias = new Date();
            // hace30Dias.setDate(hoy.getDate() - 30);
            //
            // document.getElementById('fechaInicio').value = formatFecha(hace30Dias);
            // document.getElementById('fechaFin').value = formatFecha(hoy);
        }

        function formatFecha(date) {
            const dia = String(date.getDate()).padStart(2, '0');
            const mes = String(date.getMonth() + 1).padStart(2, '0');
            const año = date.getFullYear();
            return `${dia}/${mes}/${año}`;
        }







        async function init() {
            
            const token = getToken();
            if (!token) {
                window.location.href = '/test';
                return;
            }
            
            const user = await getUserProfile();
            if (user) {
                // Inicializar date pickers
                initDatePickers();
                
                // Cargar transacciones
                await aplicarFiltros();
            }
        }
        // ========== FUNCIONES DE EXPORTAR DATOS  ==========
        async function exportarExcel() {
            const token = getToken();
            if (!token) {
                window.location.href = '/test';
                return;
            }
            
            try {
                // Mostrar mensaje de carga
                mostrarMensajeTemporal('📊 Generando archivo Excel...', 'info');
                
                const response = await fetch(`${BASE_URL}/transacciones/exportar/excel`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    // Obtener el nombre del archivo del header Content-Disposition
                    const contentDisposition = response.headers.get('Content-Disposition');
                    let filename = 'transacciones.xlsx';
                    if (contentDisposition) {
                        const match = contentDisposition.match(/filename=(.+)/);
                        if (match) filename = match[1];
                    }
                    
                    // Crear blob y descargar
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    a.remove();
                    
                    mostrarMensajeTemporal('✅ Excel descargado correctamente', 'success');
                } else {
                    const error = await response.json();
                    throw new Error(error.detail || 'Error al exportar');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarMensajeTemporal(`❌ Error: ${error.message}`, 'error');
            }
        }
